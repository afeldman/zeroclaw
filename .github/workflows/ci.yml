name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Check formatting and lints
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --all-targets --features mcp,nvidia -- -D warnings

  # ─────────────────────────────────────────────────────────────────────────────
  # Build and test on Linux
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "mcp"
          - "nvidia"
          - "nvidia,mcp"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Build (features=${{ matrix.features || 'default' }})
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --features "${{ matrix.features }}"
          else
            cargo build --release
          fi
      
      - name: Check binary size
        run: |
          ls -lh target/release/zeroclaw
          SIZE=$(stat -c%s target/release/zeroclaw)
          echo "Binary size: $SIZE bytes"
          if [ $SIZE -gt 2097152 ]; then
            echo "⚠️ Warning: Binary exceeds 2MB target"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Build and test on macOS
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        features:
          - "macos"
          - "macos,metal"
          - "macos,mcp"
          - "macos,metal,mcp"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Build (features=${{ matrix.features }})
        run: cargo build --release --features "${{ matrix.features }}"
      
      - name: Check binary size
        run: |
          ls -lh target/release/zeroclaw
          SIZE=$(stat -f%z target/release/zeroclaw)
          echo "Binary size: $SIZE bytes"

  # ─────────────────────────────────────────────────────────────────────────────
  # Build static musl binary
  # ─────────────────────────────────────────────────────────────────────────────
  build-musl:
    name: Build Linux (musl static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      
      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl
      
      - name: Verify static linking
        run: |
          file target/x86_64-unknown-linux-musl/release/zeroclaw
          ! ldd target/x86_64-unknown-linux-musl/release/zeroclaw 2>/dev/null || echo "Static binary confirmed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Run tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --all-features

  # ─────────────────────────────────────────────────────────────────────────────
  # Benchmark binary size
  # ─────────────────────────────────────────────────────────────────────────────
  size-check:
    name: Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      
      - name: Build minimal binary
        run: |
          cargo build --release --target x86_64-unknown-linux-musl
          strip target/x86_64-unknown-linux-musl/release/zeroclaw
      
      - name: Report sizes
        run: |
          echo "## Binary Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          ls -lh target/x86_64-unknown-linux-musl/release/zeroclaw | awk '{print "| musl (stripped) | " $5 " |"}' >> $GITHUB_STEP_SUMMARY
